version: "3.9"

services:
  gitea:
    image: gitea/gitea:1.22
    container_name: gitea
    restart: unless-stopped
    environment:
      USER_UID: ${GITEA_UID:-1000}
      USER_GID: ${GITEA_GID:-1000}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-http://192.168.1.164:3000/}
      GITEA__server__SSH_DOMAIN: ${GITEA_SSH_DOMAIN:-192.168.1.164}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-2222}
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "false"
      GITEA__repository__DEFAULT_BRANCH: ${GITEA_DEFAULT_BRANCH:-main}
      GITEA__database__DB_TYPE: sqlite3
      GITEA__actions__ENABLED: "false"
    volumes:
      - ${GITEA_DATA_DIR:-/volume1/docker/gitea}:/data
      - ${GITEA_TIMEZONE_FILE:-/etc/localtime}:/etc/localtime:ro
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"

