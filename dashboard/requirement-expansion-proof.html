<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requirement Expansion — Proof Panel</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --danger: #f85149;
      --warning: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1rem 1.5rem;
      min-height: 100vh;
    }
    .layout { max-width: 900px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
    .scores {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
    }
    .score-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.25rem; }
    .score-card .value { font-size: 1.5rem; font-weight: 600; }
    .score-card.ok .value { color: var(--success); }
    .score-card.warn .value { color: var(--warning); }
    .score-card.fail .value { color: var(--danger); }
    .list-section { margin-bottom: 1.5rem; }
    .list-section h3 { font-size: 0.9rem; margin: 0 0 0.5rem; color: var(--text-muted); }
    .list-section ul { margin: 0; padding-left: 1.25rem; }
    .list-section li { margin: 0.25rem 0; }
    .list-section .empty { color: var(--text-muted); font-style: italic; }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .run-form { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-top: 0.5rem; }
    .run-form input { padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); min-width: 120px; }
    .meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem; }
    .pass-results { margin-top: 1rem; }
    .pass-results h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .pass-item { padding: 0.35rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .pass-item.pass .name { color: var(--success); }
    .pass-item.fail .name { color: var(--danger); }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <h1>Requirement Expansion — Proof Panel</h1>
      <div>
        <button type="button" id="refreshBtn">Refresh</button>
      </div>
    </header>

    <div class="scores" id="scores">
      <div class="score-card" data-key="ok">
        <div class="label">Status</div>
        <div class="value">—</div>
      </div>
      <div class="score-card" data-key="missingCritical">
        <div class="label">Missing critical</div>
        <div class="value">—</div>
      </div>
      <div class="score-card" data-key="assumptionRiskScore">
        <div class="label">Assumption risk</div>
        <div class="value">—</div>
      </div>
      <div class="score-card" data-key="qualityScore">
        <div class="label">Quality score</div>
        <div class="value">—</div>
      </div>
      <div class="score-card" data-key="completenessScore">
        <div class="label">Completeness</div>
        <div class="value">—</div>
      </div>
    </div>

    <div class="list-section">
      <h3>Missing critical</h3>
      <ul id="missingCritical"></ul>
    </div>
    <div class="list-section">
      <h3>Missing important</h3>
      <ul id="missingImportant"></ul>
    </div>
    <div class="list-section">
      <h3>Follow-up questions</h3>
      <ul id="followUpQuestions"></ul>
    </div>
    <div class="list-section">
      <h3>Repairs suggested</h3>
      <ul id="repairsSuggested"></ul>
    </div>
    <div class="pass-results" id="passResults"></div>

    <div class="run-form">
      <button type="button" id="runBtn">Run proof pass</button>
      <input type="text" id="goalInput" placeholder="Goal (optional)" value="">
      <input type="text" id="appTypeInput" placeholder="App type (default)" value="default">
    </div>

    <div class="meta" id="meta"></div>
  </div>

  <script>
    (function () {
      const apiBase = window.location.origin + "/api/dashboard";
      const proofUrl = apiBase + "/requirement-expansion-proof";
      const runUrl = apiBase + "/requirement-expansion-proof/run";

      function getApiKey() {
        try {
          const m = /api_key=([^&]+)/.exec(window.location.search || "");
          if (m) return m[1];
          const stored = localStorage.getItem("architect_api_key");
          return stored || "";
        } catch (_) { return ""; }
      }

      function fetchProof() {
        const key = getApiKey();
        const headers = key ? { Authorization: "Bearer " + key } : {};
        return fetch(proofUrl, { headers }).then((r) => r.json());
      }

      function runPass(body) {
        const key = getApiKey();
        const headers = { "Content-Type": "application/json" };
        if (key) headers.Authorization = "Bearer " + key;
        return fetch(runUrl, { method: "POST", headers, body: JSON.stringify(body || {}) }).then((r) => r.json());
      }

      function renderList(id, arr) {
        const el = document.getElementById(id);
        if (!el) return;
        if (!Array.isArray(arr) || arr.length === 0) {
          el.innerHTML = '<li class="empty">None</li>';
          return;
        }
        el.innerHTML = arr.map((x) => "<li>" + escapeHtml(String(x)) + "</li>").join("");
      }

      function escapeHtml(s) {
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      function render(data) {
        const proof = data && data.proof ? data.proof : (data || {});
        const ok = proof.ok === true;
        const missingCritical = proof.missingCritical || [];
        const missingImportant = proof.missingImportant || [];
        const assumptionRiskScore = proof.assumptionRiskScore ?? 0;
        const qualityScore = proof.qualityScore ?? 0;
        const completenessScore = proof.completenessScore ?? 0;

        document.querySelector('[data-key="ok"] .value').textContent = ok ? "OK" : "Fail";
        document.querySelector('[data-key="ok"]').className = "score-card " + (ok ? "ok" : "fail");
        document.querySelector('[data-key="missingCritical"] .value').textContent = missingCritical.length;
        document.querySelector('[data-key="missingCritical"]').className = "score-card " + (missingCritical.length ? "fail" : "ok");
        document.querySelector('[data-key="assumptionRiskScore"] .value').textContent = (assumptionRiskScore * 100).toFixed(0) + "%";
        document.querySelector('[data-key="assumptionRiskScore"]').className = "score-card " + (assumptionRiskScore >= 0.6 ? "warn" : assumptionRiskScore >= 0.3 ? "warn" : "ok");
        document.querySelector('[data-key="qualityScore"] .value').textContent = (qualityScore * 100).toFixed(0) + "%";
        document.querySelector('[data-key="qualityScore"]').className = "score-card " + (qualityScore >= 0.6 ? "ok" : "fail");
        document.querySelector('[data-key="completenessScore"] .value').textContent = (completenessScore * 100).toFixed(0) + "%";
        document.querySelector('[data-key="completenessScore"]').className = "score-card " + (completenessScore >= 0.6 ? "ok" : "warn");

        renderList("missingCritical", missingCritical);
        renderList("missingImportant", missingImportant);
        renderList("followUpQuestions", proof.followUpQuestions || []);
        renderList("repairsSuggested", proof.repairsSuggested || []);

        const passResults = proof.passResults || [];
        const prEl = document.getElementById("passResults");
        if (passResults.length) {
          prEl.innerHTML = "<h3>Review passes</h3>" + passResults.map((p) =>
            '<div class="pass-item ' + (p.pass ? "pass" : "fail") + '"><span class="name">' + escapeHtml(p.name || p.id) + '</span>' + (p.issues && p.issues.length ? ": " + escapeHtml(p.issues.join("; ")) : "") + "</div>"
          ).join("");
        } else prEl.innerHTML = "";

        document.getElementById("meta").textContent = (data.generated_at ? "Generated: " + data.generated_at + " | " : "") + (data.goal ? "Goal: " + data.goal : "") + (data.appType ? " | App type: " + data.appType : "");
      }

      function load() {
        fetchProof().then(render).catch((err) => {
          render({ proof: { ok: false, missingCritical: [], missingImportant: [], assumptionRiskScore: 0, qualityScore: 0, completenessScore: 0 } });
          document.getElementById("meta").textContent = "Error: " + err.message;
        });
      }

      document.getElementById("refreshBtn").addEventListener("click", load);
      document.getElementById("runBtn").addEventListener("click", function () {
        const btn = this;
        const goal = document.getElementById("goalInput").value.trim();
        const appType = document.getElementById("appTypeInput").value.trim() || "default";
        btn.disabled = true;
        runPass({ goal, appType })
          .then(render)
          .finally(function () { btn.disabled = false; });
      });

      load();
    })();
  </script>
</body>
</html>
