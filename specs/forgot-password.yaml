name: forgot_password_flow
target: https://captureinbound.com

steps:
  - action: navigate
    url: /auth/login

  - action: click
    selector: "a[href*='forgot'], button:has-text('Forgot')"

  - action: fill
    selector: "input[type='email'], input[name='email']"
    value: "{{TEST_EMAIL}}"

  - action: click
    selector: "button[type='submit'], button:has-text('Reset')"

  - action: wait
    milliseconds: 3000

captures:
  screenshot: true
  console: true
