name: MCP Contract Checks

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: MCP sync
        run: npm run -s mcp:sync

      - name: MCP inspector contract check
        run: npm run -s mcp:inspector:contract
